<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="body-login">

    <div class="container login-container">

        <div class="card login-card shadow-lg">

            <!-- CABEÇALHO -->
            <div class="card-header card-header-blue text-center">
                <h3>Login Administrativo</h3>
            </div>

            <!-- CORPO -->
            <div class="card-body">

                <!-- CAIXA DE CREDENCIAIS -->
                <div class="info-box mb-4">
                    <strong>Credenciais de Teste</strong>
                    <p class="mb-1">Email: admin@gmail.com</p>
                    <p class="mb-0">Senha: 123456</p>
                </div>

                <!-- ALERTA DE ERRO -->
                <div id="alerta-erro" class="alert alert-danger d-none" role="alert">
                    Email ou senha incorretos. Tente novamente.
                </div>

                <!-- ALERTA DE SUCESSO -->
                <div id="alerta-sucesso" class="alert alert-success d-none" role="alert">
                    Login realizado com sucesso! Redirecionando...
                </div>

                <!-- FORM -->
                <form id="form-login" novalidate>

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            id="input-email"
                            class="form-control"
                            placeholder="Digite seu email">
                        <div class="invalid-feedback">Por favor, insira um email válido.</div>
                    </div>

                    <!-- SENHA -->
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <input
                                type="password"
                                id="input-senha"
                                class="form-control"
                                placeholder="Digite sua senha">
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                id="btn-ver-senha"
                                title="Mostrar/ocultar senha">
                                Ver
                            </button>
                        </div>
                        <div class="invalid-feedback d-block" id="erro-senha" style="display:none!important"></div>
                    </div>

                    <!-- BOTÃO -->
                    <button type="submit" class="btn-login" id="btn-entrar">
                        Entrar
                    </button>

                </form>

            </div>

        </div>

        <!-- BOTÃO VOLTAR -->
        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-dark">Voltar ao Site</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        // ── CREDENCIAIS VÁLIDAS ──
        const USUARIO_VALIDO = {
            email: "admin@gmail.com",
            senha: "123456"
        };

        const form        = document.getElementById("form-login");
        const inputEmail  = document.getElementById("input-email");
        const inputSenha  = document.getElementById("input-senha");
        const alertaErro  = document.getElementById("alerta-erro");
        const alertaSuc   = document.getElementById("alerta-sucesso");
        const btnVer      = document.getElementById("btn-ver-senha");
        const btnEntrar   = document.getElementById("btn-entrar");

        // ── MOSTRAR / OCULTAR SENHA ──
        btnVer.addEventListener("click", () => {
            const tipo = inputSenha.type === "password" ? "text" : "password";
            inputSenha.type = tipo;
            btnVer.textContent = tipo === "password" ? "Ver" : "Ocultar";
        });

        // ── SUBMIT DO FORMULÁRIO ──
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const email = inputEmail.value.trim();
            const senha = inputSenha.value.trim();

            // Esconde alertas anteriores
            alertaErro.classList.add("d-none");
            alertaSuc.classList.add("d-none");
            inputEmail.classList.remove("is-invalid");
            inputSenha.classList.remove("is-invalid");

            // Validação campos vazios
            let valido = true;

            if (!email) {
                inputEmail.classList.add("is-invalid");
                valido = false;
            }

            if (!senha) {
                inputSenha.classList.add("is-invalid");
                valido = false;
            }

            if (!valido) return;

            // Validação de credenciais
            if (email === USUARIO_VALIDO.email && senha === USUARIO_VALIDO.senha) {

                // Sucesso
                alertaSuc.classList.remove("d-none");
                btnEntrar.disabled = true;
                btnEntrar.textContent = "Entrando...";

                // Salva sessão e redireciona após 1.5s
                sessionStorage.setItem("logado", "true");
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            } else {

                // Erro
                alertaErro.classList.remove("d-none");
                inputEmail.classList.add("is-invalid");
                inputSenha.classList.add("is-invalid");

                // Shake no card
                const card = document.querySelector(".login-card");
                card.style.animation = "shake 0.4s ease";
                setTimeout(() => card.style.animation = "", 400);
            }
        });

    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-5px); }
            80%       { transform: translateX(5px); }
        }
    </style>

</body>

</html>
