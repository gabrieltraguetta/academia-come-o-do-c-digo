<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Seu CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <title>Personal Trainer</title>
</head>
<body>

  <!-- HERO -->
  <section class="hero-banner">

    <!-- NAVBAR -->
    <div class="top-bar">

      <img src="../imagens/logo.png" alt="Logo">
      <button class="btn-cadastro">
        Cadastre-se
      </button>

      <div class="menu">
        ☰
      </div>

    </div>

    <!-- TEXTO -->
    <div class="hero-content">

      <small>
        + 2.600 RESULTADOS POSITIVOS
      </small>

      <h1>
        Treinamento<br>
        personalizado para<br>
        resultados reais.
      </h1>

      <h2>
        Treine certo. Evolua de verdade.
      </h2>

    </div>

  </section>

  <!-- FAIXA -->
  <section class="faixa-branca">
    Encontre o Personal
    <span>mais próximo de você</span>
  </section>

  <!-- ÁREA CINZA -->
  <section class="area-personal">

    <div>
      <button class="btn-escolher">
        Escolher Personal
      </button>
    </div>

    <div class="celular">
      <img src="../imagens/whatzap.png" alt="WhatsApp Personal">
    </div>

  </section>

</body>
</html>
