<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Seu CSS -->
  <link rel="stylesheet" href="style.css">

  <title>Personal Trainer</title>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero-banner text-white">

    <!-- TOPO -->
    <div class="container-fluid py-3 px-4 d-flex justify-content-between align-items-center"
         style="background: #cfcfcf;">

      <!-- LOGO -->
      <img src="logo.png" alt="Logo" style="width: 60px;">

      <!-- BOTÃO -->
      <button class="btn px-4 fw-bold"
              style="background: rgb(216, 202, 0); border-radius: 8px;">
        Cadastre-se
      </button>

      <!-- MENU -->
      <div style="font-size: 30px; cursor: pointer;">
        ☰
      </div>
    </div>

    <!-- TEXO PRINCIPAL -->
    <div class="container py-5">

      <p class="mb-2 fw-bold"
         style="color: rgb(216, 202, 0); font-size: 14px;">
        + 2.600 RESULTADOS POSITIVOS
      </p>

      <h1 class="display-4 fw-bold"
          style="max-width: 500px; font-family: serif;">
        Treinamento<br>
        personalizado para<br>
        resultados reais.
      </h1>

      <h2 class="mt-4"
          style="color: rgb(216, 202, 0); font-family: serif;">
        Treine certo. Evolua de verdade.
      </h2>

    </div>
  </section>

  <!-- FAIXA BRANCA -->
  <section class="bg-white text-center py-3">
    <h5 class="m-0 fst-italic text-dark">
      Encontre o Personal
      <span style="color: rgb(216, 202, 0);">
        mais próximo de você
      </span>
    </h5>
  </section>

  <!-- ÁREA CINZA -->
  <section style="background: #d3d3d3; min-height: 500px;">

    <div class="container py-5">

      <div class="row align-items-center justify-content-between">

        <!-- BOTÃO -->
        <div class="col-md-6 text-center">
          <button class="btn px-5 py-2 rounded-pill bg-white fst-italic">
            Escolher Personal
          </button>
        </div>

        <!-- CELULAR -->
        <div class="col-md-6 text-center">
          <img src="celular.png"
               alt="WhatsApp Personal"
               class="img-fluid"
               style="max-width: 250px;">
        </div>

      </div>

    </div>
  </section>

</body>
</html>
